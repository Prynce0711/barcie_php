<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BarCIE SMTP Live Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0b1f35;
        --bg-mid: #204c72;
        --panel: rgba(255, 255, 255, 0.95);
        --ink: #12263d;
        --muted: #5f6f82;
        --accent: #d94b2b;
        --ok: #0f7a4b;
        --err: #b42318;
        --line: #d8e0ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 20% 15%,
            rgba(255, 255, 255, 0.2),
            transparent 35%
          ),
          radial-gradient(
            circle at 82% 80%,
            rgba(255, 255, 255, 0.18),
            transparent 42%
          ),
          linear-gradient(140deg, var(--bg-deep), var(--bg-mid));
        display: grid;
        place-items: center;
      }

      .panel {
        width: min(860px, 100%);
        border-radius: 18px;
        background: var(--panel);
        padding: 28px;
        box-shadow: 0 24px 64px rgba(8, 19, 33, 0.3);
        backdrop-filter: blur(6px);
        animation: panel-in 500ms ease-out;
      }

      @keyframes panel-in {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.55rem, 3.4vw, 2.2rem);
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 0 0 22px;
        color: var(--muted);
        max-width: 72ch;
      }

      form {
        display: grid;
        gap: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 0.92rem;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        color: var(--ink);
        background: #fff;
        transition:
          border-color 150ms ease,
          box-shadow 150ms ease;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #5f90d9;
        box-shadow: 0 0 0 3px rgba(95, 144, 217, 0.2);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .btn {
        justify-self: start;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, #dc5a35, var(--accent));
        color: #fff;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 11px 18px;
        cursor: pointer;
        transition:
          transform 120ms ease,
          box-shadow 120ms ease;
        box-shadow: 0 8px 20px rgba(217, 75, 43, 0.34);
      }

      .btn:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      .btn:disabled {
        opacity: 0.65;
        cursor: progress;
        box-shadow: none;
      }

      .status {
        margin-top: 18px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        background: #f8fafc;
      }

      .status.ok {
        border-color: rgba(15, 122, 75, 0.35);
        background: rgba(15, 122, 75, 0.08);
      }

      .status.error {
        border-color: rgba(180, 35, 24, 0.35);
        background: rgba(180, 35, 24, 0.08);
      }

      .status-title {
        font-weight: 700;
        margin-bottom: 4px;
      }

      pre {
        margin: 10px 0 0;
        font-family: "IBM Plex Mono", Consolas, monospace;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.84rem;
        color: #243b53;
      }

      @media (max-width: 700px) {
        body {
          padding: 14px;
        }

        .panel {
          padding: 20px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .btn {
          width: 100%;
          justify-self: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>SMTP Live Mail Test</h1>
      <p class="subtitle">
        Use this page on your live server to verify outgoing email. You must be
        logged in as admin for the API request to succeed.
      </p>

      <form id="smtp-form">
        <div class="field">
          <label for="endpoint">API endpoint</label>
          <input
            id="endpoint"
            name="endpoint"
            type="text"
            value="./api/index.php?endpoint=TestSmtp"
          />
        </div>

        <div class="grid">
          <div class="field">
            <label for="to">Recipient email</label>
            <input
              id="to"
              name="to"
              type="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="field">
            <label for="subject">Subject</label>
            <input
              id="subject"
              name="subject"
              type="text"
              value="BarCIE live SMTP test"
            />
          </div>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message">
If you received this email, SMTP is working on the live server.</textarea
          >
        </div>

        <button class="btn" id="send-btn" type="submit">Send test email</button>
      </form>

      <section class="status" id="status-box" aria-live="polite">
        <div class="status-title">Result</div>
        <div id="status-text">No test sent yet.</div>
        <pre id="status-details"></pre>
      </section>
    </main>

    <script>
      (function () {
        var form = document.getElementById("smtp-form");
        var endpointInput = document.getElementById("endpoint");
        var toInput = document.getElementById("to");
        var subjectInput = document.getElementById("subject");
        var messageInput = document.getElementById("message");
        var sendBtn = document.getElementById("send-btn");
        var statusBox = document.getElementById("status-box");
        var statusText = document.getElementById("status-text");
        var statusDetails = document.getElementById("status-details");

        function setStatus(type, text, details) {
          statusBox.classList.remove("ok", "error");
          if (type) {
            statusBox.classList.add(type);
          }

          statusText.textContent = text;
          statusDetails.textContent = details || "";
        }

        form.addEventListener("submit", async function (event) {
          event.preventDefault();

          var endpoint =
            endpointInput.value.trim() || "./api/index.php?endpoint=TestSmtp";
          var payload = {
            to: toInput.value.trim(),
            subject: subjectInput.value.trim(),
            message: messageInput.value.trim(),
          };

          sendBtn.disabled = true;
          sendBtn.textContent = "Sending...";
          setStatus("", "Sending test email...", "");

          try {
            var response = await fetch(endpoint, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Accept: "application/json",
              },
              credentials: "include",
              body: JSON.stringify(payload),
            });

            var raw = await response.text();
            var data;

            try {
              data = JSON.parse(raw);
            } catch (jsonError) {
              throw new Error(
                "API did not return JSON. First 300 chars: " +
                  raw.slice(0, 300),
              );
            }

            if (!response.ok || !data.success) {
              throw new Error(
                data.error || "Request failed with HTTP " + response.status,
              );
            }

            setStatus(
              "ok",
              "Email sent successfully.",
              JSON.stringify(data, null, 2),
            );
          } catch (error) {
            setStatus(
              "error",
              error && error.message ? error.message : "Failed to send email.",
              "Tip: log in as admin, verify SMTP values in .env, and confirm the endpoint path.",
            );
          } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = "Send test email";
          }
        });
      })();
    </script>
  </body>
</html>
